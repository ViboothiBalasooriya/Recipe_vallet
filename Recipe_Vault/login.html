<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | Digital Recipe Book</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .login-split {
            min-height: 100vh;
        }

        .login-image {
            background: url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
        }

        .login-form-container {
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>

<body>
 <div class="container-fluid p-0">
        <div class="row g-0 login-split">
            <!-- Left Side: Form -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center p-5 bg-white">
                <div class="login-form-container reveal active">
                    <div class="mb-5">
                        <a href="index.html"
                            class="text-decoration-none text-success fw-bold fs-4 mb-4 d-inline-block">🍴 RecipeVault</a>
                        <h1 class="fw-bold mb-2" id="authTitle">Welcome Back</h1>
                        <p class="text-muted" id="authSub">Sign in to your account to continue your culinary journey.
                        </p>
                    </div>

                    <div class="auth-toggle mb-4 p-1 bg-light rounded-3 d-flex">
                        <button class="btn btn-success w-50 py-2 rounded-2 shadow-sm" id="loginTab"
                            onclick="toggleAuth('login')">Login</button>
                        <button class="btn btn-link text-muted text-decoration-none w-50 py-2" id="signupTab"
                            onclick="toggleAuth('signup')">Sign Up</button>
                    </div>

                    <form id="authForm">
                        <div id="signupFields" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-uppercase">Full Name</label>
                                <input type="text" class="form-control bg-light border-0 py-3" placeholder="John Doe">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Email Address</label>
                            <input type="email" class="form-control bg-light border-0 py-3"
                                placeholder="chef@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase">Password</label>
                            <input type="password" class="form-control bg-light border-0 py-3" placeholder="••••••••"
                                required>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4" id="rememberMeSection">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label small" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-success small text-decoration-none">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-3 mb-4 shadow-sm" id="submitBtn">Sign
                            In</button>

                        <div class="text-center">
                            <p class="small text-muted mb-0" id="authFooter">Don't have an account? <a
                                    href="javascript:void(0)" class="text-success fw-bold text-decoration-none"
                                    onclick="toggleAuth('signup')">Join the community</a></p>
                        </div>
                    </form>
                </div>
            </div>
 <div class="col-lg-6 d-none d-lg-block login-image">
                <div class="h-100 w-100 d-flex align-items-end p-5"
                    style="background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);">
                    <div class="text-white">
                        <h2 class="display-6 fw-bold mb-3">"Cooking is like love. It should be entered into with abandon
                            or not at all."</h2>
                        <p class="fs-5 opacity-75">— Harriet van Horne</p>
                    </div>
                </div>
            </div>
        </div>
    </div>





       <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleAuth(type) {
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const signupFields = document.getElementById('signupFields');
            const submitBtn = document.getElementById('submitBtn');
            const authTitle = document.getElementById('authTitle');
            const authSub = document.getElementById('authSub');
            const authFooter = document.getElementById('authFooter');
            const rememberMe = document.getElementById('rememberMeSection');

            if (type === 'signup') {
                loginTab.classList.remove('btn-success', 'shadow-sm');
                loginTab.classList.add('btn-link', 'text-muted');
                signupTab.classList.add('btn-success', 'shadow-sm');
                signupTab.classList.remove('btn-link', 'text-muted');
                signupFields.style.display = 'block';
                authTitle.innerText = 'Create Account';
                authSub.innerText = 'Join our community of food enthusiasts today.';
                submitBtn.innerText = 'Join RecipeBook';
                authFooter.innerHTML = 'Already have an account? <a href="javascript:void(0)" class="text-success fw-bold text-decoration-none" onclick="toggleAuth(\'login\')">Sign In</a>';
                rememberMe.style.display = 'none';
            } else {
                signupTab.classList.remove('btn-success', 'shadow-sm');
                signupTab.classList.add('btn-link', 'text-muted');
                loginTab.classList.add('btn-success', 'shadow-sm');
                loginTab.classList.remove('btn-link', 'text-muted');
                signupFields.style.display = 'none';
                authTitle.innerText = 'Welcome Back';
                authSub.innerText = 'Sign in to your account to continue your culinary journey.';
                submitBtn.innerText = 'Sign In';
                authFooter.innerHTML = 'Don\'t have an account? <a href="javascript:void(0)" class="text-success fw-bold text-decoration-none" onclick="toggleAuth(\'signup\')">Join the community</a>';
                rememberMe.style.display = 'flex';
            }
        }
    </script>
</body>

</html>
